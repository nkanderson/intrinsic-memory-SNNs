# Search space for FractionalLIF neuron type
# Includes fractional-order specific parameters (alpha, lam, history_length, dt)

training:
  batch_size:
    type: categorical
    choices: [64, 128, 256]
  gamma:
    type: float
    low: 0.95
    high: 0.999
  eps_start:
    type: float
    low: 0.8
    high: 1.0
  eps_end:
    type: float
    low: 0.005
    high: 0.1
  eps_decay:
    type: int
    low: 1000
    high: 5000
  tau:
    type: float
    low: 0.001
    high: 0.01
  lr:
    type: float
    low: 1.0e-4
    high: 1.0e-2
    log: true
  num_episodes:
    type: fixed
    value: 1000

snn:
  num_steps:
    type: categorical
    choices: [10, 20, 30, 50]
  beta:
    type: fixed
    value: 0.9 # Not used by fractional dynamics, kept for compatibility
  surrogate_gradient_slope:
    type: fixed
    value: 25
  neuron_type:
    type: fixed
    value: fractional
  hidden1_size:
    type: categorical
    choices: [8, 16, 32]
  hidden2_size:
    type: categorical
    choices: [4, 8, 16]

  # Fractional-order specific parameters
  alpha:
    type: fixed
    value: 0.5
  lam:
    type: float
    low: 0.05
    high: 0.3
  history_length:
    type: categorical
    choices: [4, 8, 16, 32]
  dt:
    type: fixed
    value: 1.0
