# Search space for BitshiftLIF neuron type
# Includes bitshift-specific parameters (shift_func, lam, history_length, dt)
#
# NOTE: history_length interacts with shift_func. For 'simple' shift_func,
# keep history_length small (<=20) to avoid numerical instability.
# The optimize.py script handles this constraint automatically.

training:
  batch_size:
    type: categorical
    choices: [ 64, 128, 256 ]
  gamma:
    type: float
    low: 0.95
    high: 0.999
  eps_start:
    type: float
    low: 0.8
    high: 1.0
  eps_end:
    type: float
    low: 0.005
    high: 0.1
  eps_decay:
    type: int
    low: 1000
    high: 3000
  tau:
    type: float
    low: 0.001
    high: 0.01
  lr:
    type: float
    low: 1.0e-4
    high: 1.0e-2
    log: true
  num_episodes:
    type: fixed
    value: 1000

snn:
  num_steps:
    type: categorical
    choices: [ 10, 20, 30 ]
  beta:
    type: fixed
    value: 0.9 # Not used by bitshift dynamics, kept for compatibility
  surrogate_gradient_slope:
    type: fixed
    value: 25
  neuron_type:
    type: fixed
    value: bitshift
  hidden1_size:
    type: categorical
    choices: [ 16, 32, 64, 128 ]
  hidden2_size:
    type: categorical
    choices: [ 8, 16, 32, 64 ]

  # BitshiftLIF specific parameters
  shift_func:
    type: fixed
    value: "simple"
  lam:
    type: float
    low: 0.05
    high: 0.3
  history_length:
    type: categorical
    choices: [ 4, 8, 16 ]
  dt:
    type: fixed
    value: 1.0
