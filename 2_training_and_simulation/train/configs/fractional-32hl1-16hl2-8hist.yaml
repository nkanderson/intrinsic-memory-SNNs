# Baseline configuration for SNN-DQN on CartPole-v1
# This config comes from an Optuna trial scoring at least 490.0 average reward

training:
  batch_size: 64 # Transitions sampled from replay buffer
  gamma: 0.9942693673059027 # Discount factor for future rewards
  eps_start: 0.8173878966841615 # Starting exploration rate
  eps_end: 0.06662389033559024 # Minimum exploration rate
  eps_decay: 2944 # Epsilon decay rate (higher = slower decay, longer exploration)
  tau: 0.005758859359240154 # Target network soft update rate
  lr: 0.0002194505044195212 # AdamW learning rate
  num_episodes: 1000 # Total training episodes
  eval_every_episodes: 50 # Run fixed-seed evaluation every N training episodes
  eval_num_episodes: 30 # Number of episodes for each fixed-seed evaluation
  eval_seed_base: 42 # First evaluation seed
  eval_seed_stride: 7 # Seed increment between evaluation episodes

snn:
  num_steps: 30 # SNN simulation timesteps per environment step
  beta: 0.9 # LIF neuron membrane decay rate (NOTE: not used for fractional neurons, see lam instead)
  surrogate_gradient_slope: 25 # Slope for fast_sigmoid surrogate gradient
  neuron_type: fractional # Neuron type: 'leaky', 'leakysv', or 'fractional'
  hidden1_size: 32 # Neurons in first hidden layer
  hidden2_size: 16 # Neurons in second hidden layer

  # Fractional-order LIF specific parameters (used only when neuron_type: fractional)
  alpha: 0.5 # Fractional order for derivative (0 < alpha <= 1)
  lam: 0.0675689544522356 # Leakage parameter
  history_length: 8 # Number of past values for GL approximation
  dt: 1.0 # Discrete timestep for GL approximation
