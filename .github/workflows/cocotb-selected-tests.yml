name: Cocotb Selected Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - common/sv/neurons/**
      - 2_training_and_simulation/sv/**
      - 2_training_and_simulation/sv/cocotb/**
      - .github/workflows/cocotb-selected-tests.yml
  push:
    branches: [main]
    paths:
      - common/sv/neurons/**
      - 2_training_and_simulation/sv/**
      - 2_training_and_simulation/sv/cocotb/**
      - .github/workflows/cocotb-selected-tests.yml

jobs:
  cocotb-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build cocotb Docker image
        working-directory: 2_training_and_simulation/sv/cocotb
        run: docker compose build

      - name: Run selected cocotb tests (ordered)
        working-directory: 2_training_and_simulation/sv/cocotb
        run: |
          docker compose run --rm cocotb bash -lc '
            set -euo pipefail
            cd /workspace/tests

            echo "[1/12] test_lif"
            make test_lif

            echo "[2/12] test_fractional_lif"
            make test_fractional_lif

            echo "[3/12] test_bitshift_lif (default mode target)"
            make test_bitshift_lif

            echo "[4/12] test_bitshift_lif_mode0"
            make test_bitshift_lif_mode0

            echo "[5/12] test_bitshift_lif_mode1"
            make test_bitshift_lif_mode1

            echo "[6/12] test_bitshift_lif_mode2"
            make test_bitshift_lif_mode2

            echo "[7/12] test_bitshift_lif_mode3"
            make test_bitshift_lif_mode3

            echo "[8/12] test_neural_network"
            make test_neural_network

            echo "[9/12] test_cartpole_integration"
            make test_cartpole_integration

            echo "[10/12] test_cartpole_integration_fractional_hist8"
            make test_cartpole_integration_fractional_hist8

            echo "[11/12] test_cartpole_integration_bitshift_custom_slow_decay"
            make test_cartpole_integration_bitshift_custom_slow_decay

            echo "[12/12] test_cartpole_integration_fractional"
            make test_cartpole_integration_fractional
          '

      - name: Upload cocotb artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cocotb-results
          path: 2_training_and_simulation/sv/cocotb/results
          if-no-files-found: ignore
