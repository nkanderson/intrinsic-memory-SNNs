name: Cocotb Selected Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - common/sv/**
      - common/sv/cocotb/**
      - .github/workflows/cocotb-selected-tests.yml
  push:
    branches: [ main ]
    paths:
      - common/sv/**
      - common/sv/cocotb/**
      - .github/workflows/cocotb-selected-tests.yml

jobs:
  cocotb-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export runner UID/GID for Docker
        run: |
          echo "USER_ID=$(id -u)" >> "$GITHUB_ENV"
          echo "GROUP_ID=$(id -g)" >> "$GITHUB_ENV"

      - name: Ensure writable cocotb results dir
        run: |
          mkdir -p common/sv/cocotb/results
          chmod -R u+rwX common/sv/cocotb/results

      - name: Build cocotb Docker image
        working-directory: common/sv/cocotb
        env:
          USER_ID: ${{ env.USER_ID }}
          GROUP_ID: ${{ env.GROUP_ID }}
        run: docker compose build

      - name: Run selected cocotb tests (ordered)
        working-directory: common/sv/cocotb
        env:
          USER_ID: ${{ env.USER_ID }}
          GROUP_ID: ${{ env.GROUP_ID }}
        run: |
          docker compose run --rm cocotb bash -lc '
            set -euo pipefail
            cd /workspace/tests

            echo "[1/12] test_lif"
            make clean
            make test_lif

            echo "[2/12] test_fractional_lif"
            make clean
            make test_fractional_lif

            echo "[3/12] test_bitshift_lif (default mode target)"
            make clean
            make test_bitshift_lif

            echo "[4/12] test_bitshift_lif_mode0"
            make clean
            make test_bitshift_lif_mode0

            echo "[5/12] test_bitshift_lif_mode1"
            make clean
            make test_bitshift_lif_mode1

            echo "[6/12] test_bitshift_lif_mode2"
            make clean
            make test_bitshift_lif_mode2

            echo "[7/12] test_bitshift_lif_mode3"
            make clean
            make test_bitshift_lif_mode3

            echo "[8/12] test_neural_network"
            make clean
            make test_neural_network

            echo "[10/12] test_cp_integration_lif-32-16"
            make clean
            make test_cp_integration_lif-32-16

            echo "[10/12] test_cp_integration_lif-64-16"
            make clean
            make test_cp_integration_lif-64-16

            echo "[10/12] test_cp_integration_frac-16-4-32"
            make clean
            make test_cp_integration_frac-16-4-32

            echo "[10/12] test_cp_integration_frac-32-4-16"
            make clean
            make test_cp_integration_frac-32-4-16

            echo "[11/12] test_cp_integration_bitshift_custom_slow_decay"
            make clean
            make test_cp_integration_bitshift_custom_slow_decay
          '

      - name: Upload cocotb artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cocotb-results
          path: common/sv/cocotb/results
          if-no-files-found: ignore
