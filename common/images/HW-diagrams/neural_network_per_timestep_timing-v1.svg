<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrowS" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
    <style>
      .label   { font-family: "SFMono-Regular", Menlo, Consolas, monospace; font-size:11px; fill:#111; }
      .clk     { stroke:#444; stroke-width:1.4; fill:none; }
      .sigFc   { stroke:#a16207; stroke-width:1.7; fill:none; }
      .sigLif  { stroke:#15803d; stroke-width:1.7; fill:none; }
      .cellFc  { fill:#fde68a; stroke:#a16207; stroke-width:1.1; }
      .cellLif { fill:#bbf7d0; stroke:#15803d; stroke-width:1.1; }
      .cellMem { fill:#fef08a; stroke:#b45309; stroke-width:1.1; }
      .cellTxt { font-family: "SFMono-Regular", Menlo, Consolas, monospace; font-size:9px; fill:#111; text-anchor:middle; dominant-baseline:central; }
      .grid    { stroke:#e5e7eb; stroke-width:1; stroke-dasharray:2 3; }
      .cyc     { font-size:10px; fill:#555; text-anchor:middle; }
      .ann     { font-size:11px; fill:#555; }
      .annS    { font-size:10px; fill:#555; }
      .note    { font-size:11px; fill:#7c2d12; font-style:italic; }
      .stateLbl { font-size:11px; fill:#111; font-weight:600; text-anchor:middle; }
      .grpdiv  { stroke:#d1d5db; stroke-width:1; stroke-dasharray:3 3; }
    </style>
  </defs>

  <!-- ============== Title ============== -->
  <text x="590" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="#111">
    Per-timestep zoom — one full RUN_TIMESTEPS iteration (cycle-accurate, baseline LIF)
  </text>
  <text x="590" y="42" text-anchor="middle" class="ann">
    Pipelined design: fc2 streams 16 outputs, each triggering one HL2 neuron; membrane-buffer writes spill into next timestep.
  </text>

  <!-- ============== ts_state strip ============== -->
  <rect x="170" y="60" width="40"  height="22" fill="#dcfce7" stroke="#15803d" stroke-width="1"/>
  <rect x="210" y="60" width="40"  height="22" fill="#fef3c7" stroke="#a16207" stroke-width="1"/>
  <rect x="250" y="60" width="720" height="22" fill="#fef9c3" stroke="#a16207" stroke-width="1"/>
  <rect x="970" y="60" width="40"  height="22" fill="#f1f5f9" stroke="#475569" stroke-width="1"/>
  <rect x="1010" y="60" width="80" height="22" fill="#dcfce7" stroke="#15803d" stroke-width="1"/>

  <text x="190"  y="76" class="stateLbl" font-size="9">HL1</text>
  <text x="230"  y="76" class="stateLbl" font-size="9">FC2_S</text>
  <text x="610"  y="76" class="stateLbl">TS_FC2_HL2  (fc2 streams 16 outputs → HL2 cascade)</text>
  <text x="990"  y="76" class="stateLbl" font-size="9">NEXT</text>
  <text x="1050" y="76" class="stateLbl" font-size="9">HL1 (t+1)</text>

  <!-- ============== Cycle indices ============== -->
  <g>
    <text x="190"  y="100" class="cyc">0</text>
    <text x="230"  y="100" class="cyc">1</text>
    <text x="270"  y="100" class="cyc">2</text>
    <text x="310"  y="100" class="cyc">3</text>
    <text x="350"  y="100" class="cyc">4</text>
    <text x="390"  y="100" class="cyc">5</text>
    <text x="430"  y="100" class="cyc">6</text>
    <text x="470"  y="100" class="cyc">7</text>
    <text x="510"  y="100" class="cyc">8</text>
    <text x="550"  y="100" class="cyc">9</text>
    <text x="590"  y="100" class="cyc">10</text>
    <text x="630"  y="100" class="cyc">11</text>
    <text x="670"  y="100" class="cyc">12</text>
    <text x="710"  y="100" class="cyc">13</text>
    <text x="750"  y="100" class="cyc">14</text>
    <text x="790"  y="100" class="cyc">15</text>
    <text x="830"  y="100" class="cyc">16</text>
    <text x="870"  y="100" class="cyc">17</text>
    <text x="910"  y="100" class="cyc">18</text>
    <text x="950"  y="100" class="cyc">19</text>
    <text x="990"  y="100" class="cyc">20</text>
    <text x="1030" y="100" class="cyc">21</text>
    <text x="1070" y="100" class="cyc">22</text>
  </g>

  <!-- Light vertical gridlines (every cycle boundary) -->
  <g class="grid">
    <line x1="170"  y1="110" x2="170"  y2="500"/>
    <line x1="210"  y1="110" x2="210"  y2="500"/>
    <line x1="250"  y1="110" x2="250"  y2="500"/>
    <line x1="290"  y1="110" x2="290"  y2="500"/>
    <line x1="330"  y1="110" x2="330"  y2="500"/>
    <line x1="370"  y1="110" x2="370"  y2="500"/>
    <line x1="410"  y1="110" x2="410"  y2="500"/>
    <line x1="450"  y1="110" x2="450"  y2="500"/>
    <line x1="490"  y1="110" x2="490"  y2="500"/>
    <line x1="530"  y1="110" x2="530"  y2="500"/>
    <line x1="570"  y1="110" x2="570"  y2="500"/>
    <line x1="610"  y1="110" x2="610"  y2="500"/>
    <line x1="650"  y1="110" x2="650"  y2="500"/>
    <line x1="690"  y1="110" x2="690"  y2="500"/>
    <line x1="730"  y1="110" x2="730"  y2="500"/>
    <line x1="770"  y1="110" x2="770"  y2="500"/>
    <line x1="810"  y1="110" x2="810"  y2="500"/>
    <line x1="850"  y1="110" x2="850"  y2="500"/>
    <line x1="890"  y1="110" x2="890"  y2="500"/>
    <line x1="930"  y1="110" x2="930"  y2="500"/>
    <line x1="970"  y1="110" x2="970"  y2="500"/>
    <line x1="1010" y1="110" x2="1010" y2="500"/>
    <line x1="1050" y1="110" x2="1050" y2="500"/>
    <line x1="1090" y1="110" x2="1090" y2="500"/>
  </g>

  <!-- ============== Signals ============== -->

  <!-- clk -->
  <text x="160" y="125" text-anchor="end" class="label">clk</text>
  <path class="clk" d="M170,130 L170,115 L190,115 L190,130 L210,130 L210,115 L230,115 L230,130 L250,130 L250,115 L270,115 L270,130 L290,130 L290,115 L310,115 L310,130 L330,130 L330,115 L350,115 L350,130 L370,130 L370,115 L390,115 L390,130 L410,130 L410,115 L430,115 L430,130 L450,130 L450,115 L470,115 L470,130 L490,130 L490,115 L510,115 L510,130 L530,130 L530,115 L550,115 L550,130 L570,130 L570,115 L590,115 L590,130 L610,130 L610,115 L630,115 L630,130 L650,130 L650,115 L670,115 L670,130 L690,130 L690,115 L710,115 L710,130 L730,130 L730,115 L750,115 L750,130 L770,130 L770,115 L790,115 L790,130 L810,130 L810,115 L830,115 L830,130 L850,130 L850,115 L870,115 L870,130 L890,130 L890,115 L910,115 L910,130 L930,130 L930,115 L950,115 L950,130 L970,130 L970,115 L990,115 L990,130 L1010,130 L1010,115 L1030,115 L1030,130 L1050,130 L1050,115 L1070,115 L1070,130 L1090,130"/>

  <!-- hl1_enable: high at cycle 1 only -->
  <text x="160" y="160" text-anchor="end" class="label">hl1_enable</text>
  <path class="sigLif" d="M170,170 L210,170 L210,150 L250,150 L250,170 L1010,170 L1010,150 L1050,150 L1050,170 L1090,170"/>
  <text x="230" y="145" text-anchor="middle" class="annS">HL1 step</text>
  <text x="1030" y="145" text-anchor="middle" class="annS">next ts</text>

  <!-- fc2_start: high at cycle 2 only -->
  <text x="160" y="195" text-anchor="end" class="label">fc2_start</text>
  <path class="sigFc" d="M170,205 L250,205 L250,185 L290,185 L290,205 L1090,205"/>

  <!-- fc2_output_valid: high cycles 4..19 -->
  <text x="160" y="230" text-anchor="end" class="label">fc2_output_valid</text>
  <path class="sigFc" d="M170,240 L330,240 L330,220 L970,220 L970,240 L1090,240"/>

  <!-- fc2_output_idx: bus with values 0..15 at cycles 4..19 -->
  <text x="160" y="270" text-anchor="end" class="label">fc2_output_idx</text>
  <g>
    <rect class="cellFc" x="330" y="258" width="40" height="24"/><text class="cellTxt" x="350" y="270">0</text>
    <rect class="cellFc" x="370" y="258" width="40" height="24"/><text class="cellTxt" x="390" y="270">1</text>
    <rect class="cellFc" x="410" y="258" width="40" height="24"/><text class="cellTxt" x="430" y="270">2</text>
    <rect class="cellFc" x="450" y="258" width="40" height="24"/><text class="cellTxt" x="470" y="270">3</text>
    <rect class="cellFc" x="490" y="258" width="40" height="24"/><text class="cellTxt" x="510" y="270">4</text>
    <rect class="cellFc" x="530" y="258" width="40" height="24"/><text class="cellTxt" x="550" y="270">5</text>
    <rect class="cellFc" x="570" y="258" width="40" height="24"/><text class="cellTxt" x="590" y="270">6</text>
    <rect class="cellFc" x="610" y="258" width="40" height="24"/><text class="cellTxt" x="630" y="270">7</text>
    <rect class="cellFc" x="650" y="258" width="40" height="24"/><text class="cellTxt" x="670" y="270">8</text>
    <rect class="cellFc" x="690" y="258" width="40" height="24"/><text class="cellTxt" x="710" y="270">9</text>
    <rect class="cellFc" x="730" y="258" width="40" height="24"/><text class="cellTxt" x="750" y="270">10</text>
    <rect class="cellFc" x="770" y="258" width="40" height="24"/><text class="cellTxt" x="790" y="270">11</text>
    <rect class="cellFc" x="810" y="258" width="40" height="24"/><text class="cellTxt" x="830" y="270">12</text>
    <rect class="cellFc" x="850" y="258" width="40" height="24"/><text class="cellTxt" x="870" y="270">13</text>
    <rect class="cellFc" x="890" y="258" width="40" height="24"/><text class="cellTxt" x="910" y="270">14</text>
    <rect class="cellFc" x="930" y="258" width="40" height="24"/><text class="cellTxt" x="950" y="270">15</text>
  </g>

  <!-- fc2_done: high cycle 19 only -->
  <text x="160" y="310" text-anchor="end" class="label">fc2_done</text>
  <path class="sigFc" d="M170,320 L930,320 L930,300 L970,300 L970,320 L1090,320"/>

  <!-- hl2_enable[i]: bus with values [0]..[15] at cycles 5..20 -->
  <text x="160" y="355" text-anchor="end" class="label">hl2_enable[i]</text>
  <g>
    <rect class="cellLif" x="370" y="343" width="40" height="24"/><text class="cellTxt" x="390" y="355">[0]</text>
    <rect class="cellLif" x="410" y="343" width="40" height="24"/><text class="cellTxt" x="430" y="355">[1]</text>
    <rect class="cellLif" x="450" y="343" width="40" height="24"/><text class="cellTxt" x="470" y="355">[2]</text>
    <rect class="cellLif" x="490" y="343" width="40" height="24"/><text class="cellTxt" x="510" y="355">[3]</text>
    <rect class="cellLif" x="530" y="343" width="40" height="24"/><text class="cellTxt" x="550" y="355">[4]</text>
    <rect class="cellLif" x="570" y="343" width="40" height="24"/><text class="cellTxt" x="590" y="355">[5]</text>
    <rect class="cellLif" x="610" y="343" width="40" height="24"/><text class="cellTxt" x="630" y="355">[6]</text>
    <rect class="cellLif" x="650" y="343" width="40" height="24"/><text class="cellTxt" x="670" y="355">[7]</text>
    <rect class="cellLif" x="690" y="343" width="40" height="24"/><text class="cellTxt" x="710" y="355">[8]</text>
    <rect class="cellLif" x="730" y="343" width="40" height="24"/><text class="cellTxt" x="750" y="355">[9]</text>
    <rect class="cellLif" x="770" y="343" width="40" height="24"/><text class="cellTxt" x="790" y="355">[10]</text>
    <rect class="cellLif" x="810" y="343" width="40" height="24"/><text class="cellTxt" x="830" y="355">[11]</text>
    <rect class="cellLif" x="850" y="343" width="40" height="24"/><text class="cellTxt" x="870" y="355">[12]</text>
    <rect class="cellLif" x="890" y="343" width="40" height="24"/><text class="cellTxt" x="910" y="355">[13]</text>
    <rect class="cellLif" x="930" y="343" width="40" height="24"/><text class="cellTxt" x="950" y="355">[14]</text>
    <rect class="cellLif" x="970" y="343" width="40" height="24"/><text class="cellTxt" x="990" y="355">[15]</text>
  </g>

  <!-- membrane_buffer write[i]: bus with values [0]..[15] at cycles 7..22 -->
  <text x="160" y="395" text-anchor="end" class="label">mem_buf_write[i]</text>
  <g>
    <rect class="cellMem" x="450"  y="383" width="40" height="24"/><text class="cellTxt" x="470"  y="395">[0]</text>
    <rect class="cellMem" x="490"  y="383" width="40" height="24"/><text class="cellTxt" x="510"  y="395">[1]</text>
    <rect class="cellMem" x="530"  y="383" width="40" height="24"/><text class="cellTxt" x="550"  y="395">[2]</text>
    <rect class="cellMem" x="570"  y="383" width="40" height="24"/><text class="cellTxt" x="590"  y="395">[3]</text>
    <rect class="cellMem" x="610"  y="383" width="40" height="24"/><text class="cellTxt" x="630"  y="395">[4]</text>
    <rect class="cellMem" x="650"  y="383" width="40" height="24"/><text class="cellTxt" x="670"  y="395">[5]</text>
    <rect class="cellMem" x="690"  y="383" width="40" height="24"/><text class="cellTxt" x="710"  y="395">[6]</text>
    <rect class="cellMem" x="730"  y="383" width="40" height="24"/><text class="cellTxt" x="750"  y="395">[7]</text>
    <rect class="cellMem" x="770"  y="383" width="40" height="24"/><text class="cellTxt" x="790"  y="395">[8]</text>
    <rect class="cellMem" x="810"  y="383" width="40" height="24"/><text class="cellTxt" x="830"  y="395">[9]</text>
    <rect class="cellMem" x="850"  y="383" width="40" height="24"/><text class="cellTxt" x="870"  y="395">[10]</text>
    <rect class="cellMem" x="890"  y="383" width="40" height="24"/><text class="cellTxt" x="910"  y="395">[11]</text>
    <rect class="cellMem" x="930"  y="383" width="40" height="24"/><text class="cellTxt" x="950"  y="395">[12]</text>
    <rect class="cellMem" x="970"  y="383" width="40" height="24"/><text class="cellTxt" x="990"  y="395">[13]</text>
    <rect class="cellMem" x="1010" y="383" width="40" height="24"/><text class="cellTxt" x="1030" y="395">[14]</text>
    <rect class="cellMem" x="1050" y="383" width="40" height="24"/><text class="cellTxt" x="1070" y="395">[15]</text>
  </g>

  <!-- ============== Pipeline arrows: fc2 idx → hl2 enable → mem_buf_write ============== -->
  <!-- Annotated diagonals showing the +1 cycle delay between each stage -->
  <path d="M350,282 L390,343" stroke="#888" stroke-width="0.9" stroke-dasharray="2 2" fill="none" marker-end="url(#arrowS)"/>
  <path d="M390,367 L470,383" stroke="#888" stroke-width="0.9" stroke-dasharray="2 2" fill="none" marker-end="url(#arrowS)"/>
  <text x="370" y="320" class="annS" fill="#888" font-style="italic">+1 cyc</text>
  <text x="430" y="380" class="annS" fill="#888" font-style="italic">+1 cyc (after HL2 LIF)</text>

  <!-- ============== Marker for next-timestep pipelining ============== -->
  <line x1="1010" y1="50" x2="1010" y2="430" stroke="#7c3aed" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="1020" y="445" class="note" font-size="10">timestep boundary →  HL2 writes [14], [15] complete in the next timestep</text>

  <!-- ============== Notes block ============== -->
  <g>
    <rect x="40" y="475" width="1100" height="225" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
    <text x="55" y="495" font-weight="600" fill="#111" font-size="12">Cycle-by-cycle breakdown (one RUN_TIMESTEPS iteration):</text>
    <text x="55" y="514" class="ann">•  <tspan font-family="SFMono-Regular, Menlo, Consolas, monospace">cycle 0</tspan> — ts_state = TS_HL1_STEP. FSM queues <tspan font-family="SFMono-Regular, Menlo, Consolas, monospace">hl1_enable</tspan>.</text>
    <text x="55" y="531" class="ann">•  <tspan font-family="SFMono-Regular, Menlo, Consolas, monospace">cycle 1</tspan> — ts_state = TS_FC2_START. <tspan font-family="SFMono-Regular, Menlo, Consolas, monospace">hl1_enable = 1</tspan>; all 64 HL1 LIFs advance one timestep in parallel. FSM queues <tspan font-family="SFMono-Regular, Menlo, Consolas, monospace">fc2_start</tspan>.</text>
    <text x="55" y="548" class="ann">•  <tspan font-family="SFMono-Regular, Menlo, Consolas, monospace">cycle 2</tspan> — ts_state = TS_FC2_HL2. <tspan font-family="SFMono-Regular, Menlo, Consolas, monospace">fc2_start = 1</tspan>; fc2 reads HL1 spike vector.</text>
    <text x="55" y="565" class="ann">•  <tspan font-family="SFMono-Regular, Menlo, Consolas, monospace">cycle 3</tspan> — fc2 latches inputs (linear_layer's internal IDLE→COMPUTING).</text>
    <text x="55" y="582" class="ann">•  <tspan font-family="SFMono-Regular, Menlo, Consolas, monospace">cycles 4..19</tspan> — fc2 streams 16 outputs, one per cycle (output_idx = 0..15). <tspan font-family="SFMono-Regular, Menlo, Consolas, monospace">fc2_done</tspan> pulses with the last output.</text>
    <text x="55" y="599" class="ann">•  <tspan font-family="SFMono-Regular, Menlo, Consolas, monospace">cycles 5..20</tspan> — <tspan font-family="SFMono-Regular, Menlo, Consolas, monospace">hl2_enable[i]</tspan> cascade: registered <tspan font-family="SFMono-Regular, Menlo, Consolas, monospace">hl2_process_valid/idx</tspan> lag fc2 outputs by 1 cycle, enabling one HL2 neuron per cycle.</text>
    <text x="55" y="616" class="ann">•  <tspan font-family="SFMono-Regular, Menlo, Consolas, monospace">cycles 7..22</tspan> — membrane-buffer writes: HL2 LIFs produce output 1 cycle after enable, then <tspan font-family="SFMono-Regular, Menlo, Consolas, monospace">hl2_output_valid_delayed</tspan> adds another cycle of registration before the write.</text>
    <text x="55" y="633" class="ann">•  <tspan font-family="SFMono-Regular, Menlo, Consolas, monospace">cycle 20</tspan> — ts_state = TS_NEXT (advance current_timestep or transition to FINISH_Q on the final timestep).</text>
    <text x="55" y="650" class="ann">•  <tspan font-family="SFMono-Regular, Menlo, Consolas, monospace">cycle 21+</tspan> — ts_state = TS_HL1_STEP for t+1 begins overlapping while the last two HL2 buffer writes still complete.</text>
    <text x="55" y="676" class="note">Total: 21 cycles of FSM activity per timestep; HL2 buffer writes complete by cycle 22 (pipeline depth = 2 cycles past fc2_done).</text>
  </g>
</svg>
